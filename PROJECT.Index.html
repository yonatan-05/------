<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התחברות</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="PROJECT.CSS">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a href="PROJECT">
        <img src="LOGO.png" alt=" צ'קליסט" class="LOGO">
        </a>
        <div class="container-fluid">
            <span class="navbar-brand">צ'קליסט</span>
            <div class="navbar-nav">
                <a class="nav-link active" href="PROJECT">העבודות שלי</a>
                <a class="nav-link" href="PROJECT.Add Task.html">הוספת עבודה</a>
                <a class="nav-link" href="PROJECT.Contact.html">צור קשר</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 450px;">
        <h2 class="text-center mb-4 text-animation">ברוך הבא!</h2>
        <div id="loginError" style="color: #E74C3C; font-weight: bold; margin-bottom: 15px;"></div>

        <form id="loginForm" class="bg-white p-4 border rounded shadow-sm">
            <h3 class="mb-4 text-animation">התחברות</h3>
            <div class="mb-3">
                <label class="form-label">כתובת מייל באוניברסיטה:</label>
                <input type="email" id="email" class="form-control" placeholder="username@post.bgu.ac.il" required>
             </div>
             <div class="mb-3">
                <label class="form-label">סיסמה:</label>
                <input type="password" id="password" class="form-control" placeholder="לפחות 6 תווים" required>
            </div>

            <div id="registerFields" style="display: none;" class="mt-3 pt-3 border-top">
                <div class="mb-3">
                    <label class="form-label">שם מלא:</label>
                    <input type="text" id="fullName" class="form-control" placeholder="ישראל ישראלי">
                </div>
                <div class="mb-3">
                    <label class="form-label">בחר מגמת לימוד:</label>
                    <select id="departmentSelect" class="form-select">
                        <option value="">-- בחר מגמה --</option>
                        <option value="ניהול מערכות">ניהול מערכות</option>
                        <option value="פוליטיקה וממשל">פוליטיקה וממשל</option>
                        <option value="מדעי המחשב">מדעי המחשב</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">בחר סמסטר נוכחי:</label>
                    <select id="semesterSelect" class="form-select">
                        <option value="">-- בחר סמסטר --</option>
                        <option value="ד">סמסטר ד'</option>
                        <option value="ה">סמסטר ה'</option>
                        <option value="ו">סמסטר ו'</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="btnSubmitForm" class="btn btn-primary w-100 mt-3">התחבר</button>
            <button type="button" id="btnNewUser" class="btn btn-link w-100 mt-2">אני משתמש חדש (הרשמה)</button>
        </form>
    </div>

    <script src="PROJECT.JavaScript"></script>
</body>
</html>
