<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>צור קשר</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="PROJECT.CSS">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a href="PROJECT">
        <img src="LOGO.png" alt=" צ'קליסט" class="LOGO">
        </a>
        <a href="PROJECT.Index.html">
        <button type="button" class="connect button">התחבר</button>
        </a>
        <div class="container-fluid">
            <span class="navbar-brand">צ'קליסט</span>
            <div class="navbar-nav">
                <a class="nav-link" href="PROJECT">העבודות שלי</a>
                <a class="nav-link" href="PROJECT.Add Task.html">הוספת עבודה</a>
                <a class="nav-link active" href="PROJECT.Contact.html">צור קשר</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <h2 class="mb-4 text-center">יצירת קשר</h2>
        
        <form id="contactForm" class="bg-white p-4 border rounded shadow-sm">
            
            <div class="mb-3">
                <label class="form-label">בחירת מרצה:</label>
                <select id="lecturerSelect" class="form-select" required>
                    <option value=""> בחר מרצה מהרשימה</option>
                    <option value="prof_cohen">פרופ' משה כהן (פיזיקה 2)</option>
                    <option value="dr_rosen">ד"ר דנה רוזן (חקר ביצועים)</option>
                    <option value="dr_levi">ד"ר ארז לוי (מתרגל לינארית)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">נושא הפנייה:</label>
                <input type="text" id="contactSubject" class="form-control" placeholder="לדוגמא: בקשה לדחיית תאריך הגשה" required>
            </div>

            <div class="mb-3">
                <label class="form-label">פרטים:</label>
                <textarea id="contactDetails" class="form-control" rows="5" placeholder="כתוב כאן בהרחבה את פרטי הפנייה..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">שלח פנייה</button>
        </form>
    </div>

    <script src="PROJECT.JavaScript"></script>
</body>
</html>
