<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הוספת עבודה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="PROJECT.CSS">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a href="PROJECT.html">
        <img src="LOGO.png" alt=" צ'קליסט" class="LOGO">
        </a>
        <div class="container-fluid">
            <span class="navbar-brand">צ'קליסט</span>
            <div class="navbar-nav">
                <a class="nav-link" href="PROJECT.html">העבודות שלי</a>
                <a class="nav-link active" href="Add Task.html">הוספת עבודה</a>
                <a class="nav-link" href="Contact.html">צור קשר</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <h2 class="mb-4 text-center">עבודה חדשה</h2>
        <div class="bg-white p-4 border rounded shadow-sm">
            <div class="mb-3">
                <label class="form-label">שם המקצוע / הקורס:</label>
                <input type="text" id="subject" class="form-control" placeholder="לדוגמה: פיזיקה 2" required>
            </div>
            <div class="mb-3">
                <label class="form-label">תאריך הגשה :</label>
                <input type="date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">רמת קושי:</label>
                <select class="form-select">
                    <option>קל</option>
                    <option>בינוני</option>
                    <option>קשה</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">פרטים והנחיות:</label>
                <textarea id="taskDetailsInput" class="form-control" rows="3" placeholder="כתוב כאן מה צריך לעשות במטלה..." required></textarea>
            </div>
            <button type="button" id="btnSaveTask" class="btn btn-success w-100">שמור מטלה</button>
        </div>
    </div>

    <script src="PROJECT.JavaScript.JS"></script>
</body>
</html>
